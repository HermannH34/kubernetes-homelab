apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 30m
  chart:
    spec:
      chart: velero
      version: ">=8.0.0"
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
      interval: 12h
  values:
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.10.0
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins
    configuration:
      provider: aws
      backupStorageLocation:
        - name: r2
          provider: aws
          bucket: velero
          config:
            region: auto
            s3Url: https://<account-id>.r2.cloudflarestorage.com
            s3ForcePathStyle: "true"
      volumeSnapshotLocation:
        - name: default
          provider: aws
          config:
            region: auto
    credentials:
      secretContents:
        cloud: |
          [default]
          aws_access_key_id=<R2_ACCESS_KEY>
          aws_secret_access_key=<R2_SECRET_KEY>
    schedules:
      forgejo-daily:
        schedule: "0 2 * * *"
        template:
          includedNamespaces:
            - forgejo
          ttl: 720h
