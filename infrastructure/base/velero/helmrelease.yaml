apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 30m
  chart:
    spec:
      chart: velero
      version: ">=8.0.0"
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: velero
      interval: 12h
  values:
    credentials:
      useSecret: true
      secretName: velero-credentials
      existingSecret: velero-credentials
    configuration:
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: ${R2_BUCKET_NAME}
          config:
            s3Url: https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
            region: auto
            s3ForcePathStyle: "true"
      volumeSnapshotLocation:
        - name: default
          provider: aws
          config:
            region: auto
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.10.0
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins
    snapshotsEnabled: false
    deployNodeAgent: true
    nodeAgent:
      uploaderType: kopia
    defaultVolumesToFsUpload: true
    schedules:
      daily:
        disabled: true
      weekly:
        schedule: "0 2 * * 0"
        template:
          ttl: 720h0m0s
          includedNamespaces:
            - "*"
          storageLocation: default
