apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared
data:
  config.yaml: |
    tunnel: linkding
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true

    ingress:
    - hostname: grafana.quickyrails.com
      service: http://grafana.monitoring.svc.cluster.local:80
    - hostname: n8n.quickyrails.com
      service: http://n8n.n8n.svc.cluster.local:5678
    - hostname: saas-starter.quickyrails.com
      service: http://saas-starter.saas-starter.svc.cluster.local:3000
    - service: http_status:404

