apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: forgejo
spec:
  interval: 30m
  chart:
    spec:
      chart: forgejo
      version: ">=16.0.0"
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: forgejo
      interval: 12h
  valuesFrom:
    - kind: Secret
      name: forgejo-env
      valuesKey: db-password
      targetPath: gitea.config.database.PASSWD
    - kind: Secret
      name: forgejo-env
      valuesKey: mailer-user
      targetPath: gitea.config.mailer.USER
    - kind: Secret
      name: forgejo-env
      valuesKey: mailer-passwd
      targetPath: gitea.config.mailer.PASSWD
    - kind: Secret
      name: forgejo-env
      valuesKey: internal-token
      targetPath: gitea.config.security.INTERNAL_TOKEN
    - kind: Secret
      name: forgejo-env
      valuesKey: secret-key
      targetPath: gitea.config.security.SECRET_KEY
    - kind: Secret
      name: forgejo-env
      valuesKey: lfs-jwt-secret
      targetPath: gitea.config.lfs.JWT_SECRET
  values:
    replicaCount: 3

    image:
      tag: 15.0.2

    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0

    service:
      http:
        type: ClusterIP
        port: 3000
      ssh:
        type: ClusterIP
        port: 22

    ingress:
      enabled: false

    persistence:
      enabled: true
      create: true
      size: 10Gi
      storageClass: local-path
      accessModes:
        - ReadWriteOnce

    gitea:
      admin:
        existingSecret: forgejo-env
        passwordMode: keepUpdated

      config:
        APP_NAME: "Forgejo: Beyond coding. We forge."
        RUN_MODE: prod

        server:
          DOMAIN: forgejo.quickyrails.com
          ROOT_URL: https://forgejo.quickyrails.com/
          SSH_PORT: 22
          SSH_LISTEN_PORT: 2222

        database:
          DB_TYPE: postgres
          HOST: forgejo-db-rw.forgejo.svc.cluster.local:5432
          NAME: forgejo
          USER: forgejo

        packages:
          ENABLED: true

        mailer:
          ENABLED: true
          PROTOCOL: smtps
          SMTP_ADDR: smtp.gmail.com
          SMTP_PORT: 465
          FROM: ""

        service:
          DISABLE_REGISTRATION: true

        security:
          INSTALL_LOCK: true
