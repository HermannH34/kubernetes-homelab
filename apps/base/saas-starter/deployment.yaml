apiVersion: apps/v1
kind: Deployment
metadata:
  name: saas-starter
  namespace: saas-starter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: saas-starter
  template:
    metadata:
      labels:
        app: saas-starter
    spec:
      initContainers:
        - name: migrate
          # {"$imagepolicy": "flux-system:saas-starter"}
          image: ghcr.io/hermannh34/saas-starter:20260501-165944
          command: ["node_modules/.bin/drizzle-kit", "migrate"]
          env:
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: saas-starter-db-app
                  key: uri
      containers:
        - name: saas-starter
          # {"$imagepolicy": "flux-system:saas-starter"}
          image: ghcr.io/hermannh34/saas-starter:20260501-165944
          ports:
            - containerPort: 3000
          env:
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: saas-starter-db-app
                  key: uri
          envFrom:
            - secretRef:
                name: saas-starter-env
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
