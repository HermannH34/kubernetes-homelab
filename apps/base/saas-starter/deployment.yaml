apiVersion: apps/v1
kind: Deployment
metadata:
  name: saas-starter
  namespace: saas-starter
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: saas-starter
  template:
    metadata:
      labels:
        app: saas-starter
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        runAsNonRoot: true
        fsGroup: 1001
      imagePullSecrets:
        - name: ghcr-registry
      initContainers:
        - name: migrate
          image: ghcr.io/hermannh34/saas-starter:20260615-122839 # {"$imagepolicy": "flux-system:saas-starter"}
          command: ["npx", "drizzle-kit", "migrate"]
          env:
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: saas-starter-db-app
                  key: uri
      containers:
        - name: saas-starter
          image: ghcr.io/hermannh34/saas-starter:20260615-122839 # {"$imagepolicy": "flux-system:saas-starter"}
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: saas-starter-db-app
                  key: uri
          envFrom:
            - secretRef:
                name: saas-starter-env
          readinessProbe:
            httpGet:
              path: /api/user
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/user
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
