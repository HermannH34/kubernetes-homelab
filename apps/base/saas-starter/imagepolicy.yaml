apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: saas-starter
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: saas-starter
  # Filtre les tags au format YYYYMMDD-HHmmss produits par le workflow GitHub Actions.
  # Le tri alphabétique = tri chronologique → FluxCD choisit toujours la dernière image.
  filterTags:
    pattern: '^[0-9]{8}-[0-9]{6}$'
    extract: '$0'
  policy:
    alphabetical:
      order: asc
