apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: n8n
spec:
  interval: 30m
  chart:
    spec:
      chart: n8n
      version: "1.x"
      sourceRef:
        kind: HelmRepository
        name: n8n
        namespace: n8n
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
  valuesFrom:
    - kind: Secret
      name: n8n-db-app
      valuesKey: password
      targetPath: config.database.postgresdb.password
    - kind: Secret
      name: n8n-env
      valuesKey: N8N_ENCRYPTION_KEY
      targetPath: config.encryptionKey
  values:
    config:
      host: n8n.quickyrails.com
      protocol: https
      database:
        type: postgresdb
        postgresdb:
          host: n8n-db-rw.n8n.svc
          port: 5432
          database: n8n
          user: n8n
    persistence:
      enabled: false
