apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: n8n
spec:
  interval: 30m
  chart:
    spec:
      chart: n8n
      version: "2.0.1"
      sourceRef:
        kind: HelmRepository
        name: n8n
        namespace: n8n
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
  valuesFrom:
    - kind: Secret
      name: n8n-db-app
      valuesKey: password
      targetPath: main.secret.database.postgresdb.password
  values:
    main:
      replicaCount: 3
      config:
        host: n8n.quickyrails.com
        protocol: https
        database:
          type: postgresdb
          postgresdb:
            host: n8n-db-rw.n8n.svc
            port: 5432
            database: n8n
            user: n8n
      secret:
        database:
          postgresdb:
            password: ""
      persistence:
        enabled: false
      extraEnv:
        WEBHOOK_URL:
          value: "https://n8n.quickyrails.com/"
        N8N_EDITOR_BASE_URL:
          value: "https://n8n.quickyrails.com/"
        N8N_ENCRYPTION_KEY:
          valueFrom:
            secretKeyRef:
              name: n8n-env
              key: N8N_ENCRYPTION_KEY
