apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: saas-starter
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "username": "HermannH34",
          "password": "REMPLACER_PAR_PAT_GITHUB_read_packages",
          "auth": "REMPLACER_PAR_BASE64(username:password)"
        }
      }
    }
# Générer le auth field : echo -n "HermannH34:TON_PAT" | base64
# Chiffrer avec : sops --encrypt --in-place apps/staging/saas-starter/ghcr-secret.yaml
#
# Alternative simple : rendre le package GHCR public dans
# GitHub > Packages > saas-starter > Package settings > Change visibility to Public
# Dans ce cas, supprimer ce fichier et retirer imagePullSecrets du deployment.
