apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: grafana
      version: ">=8.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
      interval: 12h
  valuesFrom:
    - kind: Secret
      name: grafana-secrets
      valuesKey: adminPassword
      targetPath: adminPassword
  values:
    persistence:
      enabled: true
      existingClaim: grafana-data
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: VictoriaMetrics
            type: prometheus
            uid: victoriametrics
            url: http://victoria-metrics-victoria-metrics-single-server.monitoring.svc:8428
            access: proxy
            isDefault: true
