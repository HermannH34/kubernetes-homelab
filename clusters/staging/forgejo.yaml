apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: forgejo
  namespace: flux-system
spec:
  interval: 1m0s
  dependsOn:
    - name: cnpg
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/staging/forgejo
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
